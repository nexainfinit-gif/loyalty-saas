name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking for now: 47 pre-existing errors (2026-07-05).
      # Make this a hard gate once the lint debt is cleaned up.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test
